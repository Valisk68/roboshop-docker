services:
  catalogue:
    build: ./catalogue # it moves to mongodb directory
    image: joindevops/catalogue:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: catalogue
    depends_on:
     - mongodb
  user:
    build: ./user # it moves to mongodb directory
    image: joindevops/user:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: user
    depends_on:
    - redis
  cart:
    build: ./cart # it moves to mongodb directory
    image: joindevops/cart:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: cart
    depends_on:
    - redis
  frontend:
    build: ./frontend # it moves to mongodb directory
    image: joindevops/frontend:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
  mongodb:
    build: ./mongodb # it moves to mongodb directory
    image: joindevops/mongodb:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: mongodb
  mysql:
    build: ./mysql # it moves to mongodb directory
    image: joindevops/mysql:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: mysql
  redis:
    image: redis:7.0
    container_name: redis
  
networks:
  default:
    driver: bridge
    name: roboshop
    external: false

    
